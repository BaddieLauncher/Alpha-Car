<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTO X UPDATED</title>
<style>
body{margin:0;overflow:hidden;background:#000;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("c")});
renderer.setSize(innerWidth, innerHeight);

// SKY BLUE FOREST
scene.background = new THREE.Color(0x87ceeb);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

// ROAD
let segments=[];
const SEG_COUNT=20;

for(let i=0;i<SEG_COUNT;i++){
  const geo = new THREE.PlaneGeometry(10,5);
  const mat = new THREE.MeshStandardMaterial({color:0x333333});
  const mesh = new THREE.Mesh(geo,mat);
  mesh.rotation.x=-Math.PI/2;
  mesh.position.z=-i*5;

  // CURVE
  mesh.userData.curve = Math.sin(i*0.4)*3;

  scene.add(mesh);
  segments.push(mesh);
}

// BIKE
const bike = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,2),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
bike.position.y=0.5;
scene.add(bike);

camera.position.set(0,3,5);

// MOVEMENT
let playerX=0, targetX=0, velocityX=0;
let speed=0.2;
let nitro=false;

// CONTROLS
onkeydown=(e)=>{
  if(e.key==="ArrowLeft") targetX=-3;
  if(e.key==="ArrowRight") targetX=3;
  if(e.key===" ") nitro=true;
}
onkeyup=(e)=>{
  if(e.key==="ArrowLeft"||e.key==="ArrowRight") targetX=0;
  if(e.key===" ") nitro=false;
}

function animate(){
  requestAnimationFrame(animate);

  // SMOOTH MOVE
  velocityX += (targetX-playerX)*0.1;
  velocityX *= 0.8;
  playerX += velocityX;

  bike.position.x = playerX;
  bike.rotation.z = -velocityX*0.3;

  // NITRO
  if(nitro) speed=0.6;
  else speed=0.2;

  // ROAD MOVE
  segments.forEach((s,i)=>{
    s.position.z += speed;
    s.position.x = s.userData.curve + playerX;

    if(s.position.z>5){
      s.position.z -= SEG_COUNT*5;
    }
  });

  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
